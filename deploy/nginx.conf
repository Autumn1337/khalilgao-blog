# /mnt/e/blog/deploy/nginx.conf
#
# Reference Nginx config — NOT auto-applied. Copy to the server manually:
#
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/khalilgao.com
#   sudo ln -s /etc/nginx/sites-available/khalilgao.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   sudo apt install nginx-extras       # adds brotli
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d khalilgao.com -d www.khalilgao.com
#
# Matches spec §8 — single site, HTTPS (HTTP/2), brotli + gzip,
# immutable cache for hashed assets, no-cache for HTML (fast rollouts).
#
# HTTP/3 (QUIC) blocks commented out: Debian 12's nginx-extras is 1.22
# which predates QUIC support (1.25+). When upgrading nginx, uncomment
# the `listen ... quic` lines and the Alt-Svc header below.

# Rate-limit bucket — must live in http{} scope. Put it in conf.d or
# at the top of nginx.conf outside any server{} block:
#   limit_req_zone $binary_remote_addr zone=blog:10m rate=30r/s;

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name khalilgao.com www.khalilgao.com;
    return 301 https://khalilgao.com$request_uri;
}

# www → apex (apex is the canonical host)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    # listen 443 quic reuseport;          # needs nginx >= 1.25
    # listen [::]:443 quic reuseport;
    server_name www.khalilgao.com;

    ssl_certificate     /etc/letsencrypt/live/khalilgao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/khalilgao.com/privkey.pem;

    return 301 https://khalilgao.com$request_uri;
}

# Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    # listen 443 quic;                    # needs nginx >= 1.25
    # listen [::]:443 quic;
    server_name khalilgao.com;

    ssl_certificate     /etc/letsencrypt/live/khalilgao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/khalilgao.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Advertise HTTP/3 — commented until nginx is upgraded to a QUIC-capable
    # build; sending Alt-Svc while UDP 443 is closed makes browsers try h3,
    # fail, and waste a round-trip falling back to h2.
    # add_header Alt-Svc 'h3=":443"; ma=86400';

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    root /var/www/khalilgao.com;
    index index.html;

    # Rate limit (zone defined in http{} scope — see note at top)
    limit_req zone=blog burst=60 nodelay;

    # Compression
    #
    # Brotli disabled: Debian 12 ships nginx-extras 1.22 without a brotli
    # module, and libnginx-mod-http-brotli doesn't exist in the main repo.
    # gzip alone is close enough for this blog's payload (HTML ~15KB gz,
    # CSS ~4KB gz). To re-enable brotli, switch to the official nginx.org
    # apt source and install their ngx_brotli dynamic module, then
    # uncomment the three directives below.
    #
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/html text/css application/javascript application/json
    #              image/svg+xml application/rss+xml application/atom+xml
    #              font/woff2 application/xml;

    gzip on;
    gzip_comp_level 6;
    gzip_types text/html text/css application/javascript application/json
               image/svg+xml application/rss+xml application/xml;

    # Long-cache for immutable assets (hashed filenames from Astro)
    location ~* \.(js|css|woff2|png|jpg|jpeg|webp|avif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML: no cache so rollouts propagate immediately
    location / {
        try_files $uri $uri/ $uri.html /404.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Block hidden files and common scan patterns
    location ~ /\. { deny all; }
    location ~ /(wp-|\.env|\.git) { return 444; }

    # v2 Waline API reserved — keep commented until the service is live
    # location /api/waline/ {
    #     proxy_pass http://127.0.0.1:8360/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    error_page 404 /404.html;
}
