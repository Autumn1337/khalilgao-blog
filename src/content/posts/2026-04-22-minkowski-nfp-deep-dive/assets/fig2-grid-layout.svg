<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="system-ui, sans-serif">
  <!-- Left: naive packing (wasted space) -->
  <g transform="translate(20,30)">
    <text x="180" y="-8" text-anchor="middle" font-size="13" fill="#666">朴素布局（904K 之前）</text>
    <rect x="0" y="0" width="400" height="300" fill="none" stroke="#888" stroke-width="1" rx="4"/>
    <!-- pieces with gaps -->
    <polygon points="15,15 95,15 105,60 30,70" fill="#cfe0f4" stroke="#2e6ecc"/>
    <polygon points="120,15 190,25 200,80 125,75" fill="#fde2c9" stroke="#d46a1a"/>
    <polygon points="220,20 300,15 315,65 230,80" fill="#d7ebe5" stroke="#4a8f7c"/>
    <polygon points="330,18 385,25 390,75 335,80" fill="#ead8ef" stroke="#8a4e9f"/>

    <polygon points="20,110 100,95 120,160 35,175" fill="#fde2c9" stroke="#d46a1a"/>
    <polygon points="140,105 205,120 215,175 150,180" fill="#cfe0f4" stroke="#2e6ecc"/>
    <polygon points="230,115 310,105 320,165 240,185" fill="#ead8ef" stroke="#8a4e9f"/>

    <polygon points="25,200 90,210 105,275 30,290" fill="#d7ebe5" stroke="#4a8f7c"/>
    <polygon points="125,205 205,215 215,275 135,285" fill="#fde2c9" stroke="#d46a1a"/>

    <!-- waste labels -->
    <text x="370" y="170" font-size="10" fill="#c33">空隙</text>
    <text x="370" y="260" font-size="10" fill="#c33">空隙</text>
    <text x="200" y="320" text-anchor="middle" font-size="11" fill="#555">利用率 73.8%</text>
  </g>

  <!-- Right: NFP-optimised packing -->
  <g transform="translate(540,30)">
    <text x="180" y="-8" text-anchor="middle" font-size="13" fill="#666">NFP 引导布局（904K 之后）</text>
    <rect x="0" y="0" width="400" height="300" fill="none" stroke="#4a8f7c" stroke-width="1" rx="4"/>
    <!-- tightly nested pieces -->
    <polygon points="5,10 90,10 110,55 22,70" fill="#cfe0f4" stroke="#2e6ecc"/>
    <polygon points="95,10 195,18 210,70 110,60" fill="#fde2c9" stroke="#d46a1a"/>
    <polygon points="200,12 295,10 310,65 215,72" fill="#d7ebe5" stroke="#4a8f7c"/>
    <polygon points="305,10 395,15 395,70 318,65" fill="#ead8ef" stroke="#8a4e9f"/>

    <polygon points="18,70 115,65 130,135 32,130" fill="#fde2c9" stroke="#d46a1a"/>
    <polygon points="135,65 225,75 240,140 145,132" fill="#cfe0f4" stroke="#2e6ecc"/>
    <polygon points="245,72 330,70 340,135 250,140" fill="#ead8ef" stroke="#8a4e9f"/>
    <polygon points="345,72 395,75 395,142 350,138" fill="#d7ebe5" stroke="#4a8f7c"/>

    <polygon points="30,135 140,130 150,205 40,200" fill="#cfe0f4" stroke="#2e6ecc"/>
    <polygon points="155,135 260,138 270,205 165,208" fill="#d7ebe5" stroke="#4a8f7c"/>
    <polygon points="275,135 395,145 395,210 280,208" fill="#fde2c9" stroke="#d46a1a"/>

    <polygon points="42,210 165,208 180,290 50,295" fill="#fde2c9" stroke="#d46a1a"/>
    <polygon points="185,210 330,215 340,293 195,290" fill="#ead8ef" stroke="#8a4e9f"/>

    <text x="200" y="320" text-anchor="middle" font-size="11" fill="#2a6a54">利用率 90.4%</text>
  </g>

  <!-- divider arrow between panels -->
  <g transform="translate(460,140)">
    <line x1="0" y1="40" x2="60" y2="40" stroke="#999" stroke-width="1.4" marker-end="url(#arrow2)"/>
    <text x="30" y="30" text-anchor="middle" font-size="10" fill="#777">优化</text>
  </g>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
  </defs>
</svg>
