<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Panel A: polygon A -->
  <g transform="translate(20,30)">
    <text x="70" y="-6" text-anchor="middle" font-size="12" fill="#666">A</text>
    <polygon points="30,40 110,25 130,95 60,120" fill="#eef2f8" stroke="#2e6ecc" stroke-width="1.2"/>
    <circle cx="40" cy="58" r="2" fill="#2e6ecc"/>
    <circle cx="100" cy="40" r="2" fill="#2e6ecc"/>
    <circle cx="120" cy="100" r="2" fill="#2e6ecc"/>
    <circle cx="60" cy="115" r="2" fill="#2e6ecc"/>
  </g>

  <text x="185" y="110" font-size="22" fill="#888" text-anchor="middle">⊕</text>

  <!-- Panel B: polygon B -->
  <g transform="translate(210,55)">
    <text x="40" y="-6" text-anchor="middle" font-size="12" fill="#666">B</text>
    <polygon points="20,30 70,15 80,70 15,80" fill="#fef2e8" stroke="#d46a1a" stroke-width="1.2"/>
  </g>

  <text x="340" y="110" font-size="22" fill="#888" text-anchor="middle">=</text>

  <!-- Panel C: Minkowski sum -->
  <g transform="translate(380,10)">
    <text x="115" y="10" text-anchor="middle" font-size="12" fill="#666">A ⊕ B</text>
    <polygon
      points="50,40 130,25 165,40 220,95 235,170 165,210 60,225 25,180 20,90"
      fill="#f4fafb" stroke="#4a8f7c" stroke-width="1.4"/>
    <!-- dashed original A shape inside -->
    <polygon points="40,60 120,45 140,115 70,140" fill="none" stroke="#8fb5df" stroke-width="0.8" stroke-dasharray="3 3"/>
    <!-- sliding B along A's boundary (three poses) -->
    <polygon points="30,50 70,40 80,90 25,95" fill="none" stroke="#ecb988" stroke-width="0.8" stroke-dasharray="2 2"/>
    <polygon points="130,35 180,25 195,80 150,90" fill="none" stroke="#ecb988" stroke-width="0.8" stroke-dasharray="2 2"/>
    <polygon points="160,170 225,160 235,220 180,225" fill="none" stroke="#ecb988" stroke-width="0.8" stroke-dasharray="2 2"/>
  </g>

  <!-- caption line -->
  <line x1="20" y1="260" x2="620" y2="260" stroke="#ddd" stroke-width="0.5"/>
</svg>
