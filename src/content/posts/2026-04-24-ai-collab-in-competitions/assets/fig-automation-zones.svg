<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="system-ui, -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Segoe UI', sans-serif" role="img" aria-labelledby="auto-zones-title">
  <title id="auto-zones-title">自动化三色分区：绿色区（无脑自动化）/ 黄色区（半自动化）/ 红色区（不该全自动化）</title>

  <!-- Green zone -->
  <g transform="translate(0, 0)">
    <rect x="0" y="0" width="640" height="90" rx="4" fill="#f0f7f2" stroke="#d4e4d8" stroke-width="0.5"/>
    <rect x="0" y="0" width="6" height="90" rx="0" fill="#4a9d5a"/>
    <text x="28" y="28" font-size="14" font-weight="600" fill="#2d6a3b">绿色区 · 无脑自动化</text>
    <text x="28" y="54" font-size="12" fill="#2c2c2c">bench 执行 · diff report · 提交打包 · 数据聚合</text>
    <text x="28" y="76" font-size="11" font-style="italic" fill="#666">AI 全权 · 你不看 · 投入当天回本</text>
  </g>

  <!-- Yellow zone -->
  <g transform="translate(0, 105)">
    <rect x="0" y="0" width="640" height="90" rx="4" fill="#fbf6ea" stroke="#ece0c6" stroke-width="0.5"/>
    <rect x="0" y="0" width="6" height="90" rx="0" fill="#c99745"/>
    <text x="28" y="28" font-size="14" font-weight="600" fill="#8a6420">黄色区 · 半自动化（人类 checkpoint）</text>
    <text x="28" y="54" font-size="12" fill="#2c2c2c">线上分数录入 · hypothesis 记录 · 失败 case 归类</text>
    <text x="28" y="76" font-size="11" font-style="italic" fill="#666">AI 降摩擦 · 你确认 · 需要人类作真值源</text>
  </g>

  <!-- Red zone -->
  <g transform="translate(0, 210)">
    <rect x="0" y="0" width="640" height="90" rx="4" fill="#f7ecec" stroke="#e4cfd0" stroke-width="0.5"/>
    <rect x="0" y="0" width="6" height="90" rx="0" fill="#b94a4d"/>
    <text x="28" y="28" font-size="14" font-weight="600" fill="#8c3033">红色区 · 不该全自动化</text>
    <text x="28" y="54" font-size="12" fill="#2c2c2c">决策 · 根因分析 · portfolio 分配 · 方向选择</text>
    <text x="28" y="76" font-size="11" font-style="italic" fill="#666">AI 只做 dashboard · 你决定 · 决策代价由你承担</text>
  </g>
</svg>
